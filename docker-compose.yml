services:
  metapi:
    image: ghcr.io/wangxingfan/metapi:latest
    container_name: metapi
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - metapi-data:/app/data
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN is required}
      PROXY_TOKEN: ${PROXY_TOKEN:?PROXY_TOKEN is required}
      CHECKIN_CRON: ${CHECKIN_CRON:-0 8 * * *}
      CHECKIN_SPREAD_INTERVAL_MINUTES: ${CHECKIN_SPREAD_INTERVAL_MINUTES:-5}
      BALANCE_REFRESH_CRON: ${BALANCE_REFRESH_CRON:-0 * * * *}
      PORT: ${PORT:-4000}
      DATA_DIR: /app/data
      TZ: ${TZ:-Asia/Shanghai}

volumes:
  metapi-data:
